services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: synapse_pgvector
    restart: unless-stopped
    ports:
      - "${PG_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-synapse}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-synapse}
      POSTGRES_DB: ${PG_DATABASE:-synapse_search}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-synapse}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
